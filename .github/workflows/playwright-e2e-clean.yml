name: Playwright E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  preflight:
    name: NPM Build and Unit Tests
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Run unit tests
        run: npm run test -- --run

  e2e:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      LIBGL_ALWAYS_SOFTWARE: "1"
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers
        run: npm run pretest:e2e

      - name: Clean up simulator ports
        run: node scripts/kill-ports.mjs 9001 9002

      - name: Start simulator server
        run: node scripts/start-sim-bg.mjs

      - name: Wait for simulator to be ready
        run: npx wait-on http://localhost:9002 --timeout 30000

      - name: Run E2E tests
        run: npm run test:e2e:ci
        timeout-minutes: 30

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ matrix.os }}-${{ github.run_id }}
          path: |
            playwright-report
            test-results
            test-results/**/trace.zip
            test-results/**/video
            test-results/**/screenshot

      - name: Cleanup simulator
        if: always()
        run: node scripts/stop-sim.mjs
