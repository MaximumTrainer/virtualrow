name: NPM Preflight

on:
  workflow_call:

permissions:
  contents: read

jobs:
  preflight:
    name: NPM Build and Unit Tests
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Run unit tests
        run: npm run test -- --run
