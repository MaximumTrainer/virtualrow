name: NPM Preflight

on:
  workflow_call:

permissions:
  contents: read

jobs:
  preflight:
    name: NPM Build and Unit Tests
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Run unit tests
        run: npm run test -- --run

      - name: Run unit-test coverage gate
        # Thresholds are configured in vitest.config.ts (`test.coverage.thresholds`).
        # vitest exits non-zero if the configured per-metric thresholds are missed,
        # turning this into a hard CI gate.
        run: npm run coverage
