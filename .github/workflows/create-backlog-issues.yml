name: Create backlog issues

on:
  workflow_dispatch:
    inputs:
      backlog_path:
        description: Path to backlog markdown file
        required: true
        default: BACKLOG.md
        type: string
      label:
        description: Label to apply (created if missing). Leave blank for none.
        required: false
        default: backlog
        type: string
      dry_run:
        description: When true, only logs what would be created
        required: true
        default: true
        type: boolean
      limit:
        description: Maximum number of issues to create in one run
        required: true
        default: 20
        type: number

permissions:
  contents: read
  issues: write

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create issues from backlog
        uses: actions/github-script@v7
        env:
          INPUT_BACKLOG_PATH: ${{ inputs.backlog_path }}
          INPUT_LABEL: ${{ inputs.label }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_LIMIT: ${{ inputs.limit }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const backlogPath = core.getInput('backlog_path');
            const label = core.getInput('label')?.trim();
            const dryRun = core.getBooleanInput('dry_run');
            const limit = Number(core.getInput('limit') || 20);

            const fullPath = path.resolve(process.env.GITHUB_WORKSPACE, backlogPath);
            if (!fs.existsSync(fullPath)) {
              core.setFailed(`Backlog file not found: ${backlogPath}`);
              return;
            }

            const text = fs.readFileSync(fullPath, 'utf8');
            const lines = text.split(/\r?\n/);

            /** @type {{ title: string, body: string }[]} */
            const entries = [];
            let current = null;

            const flush = () => {
              if (!current) return;
              const title = current.title.trim();
              const body = current.bodyLines.join('\n').trim();
              if (title.length > 0) {
                entries.push({
                  title,
                  body: [
                    body,
                    '',
                    `Generated from \`${backlogPath}\` via workflow run ${context.runId}.`,
                  ]
                    .filter(Boolean)
                    .join('\n'),
                });
              }
              current = null;
            };

            for (const rawLine of lines) {
              const line = rawLine.trimEnd();
              const m = line.match(/^\s*- \[ \] (.+)$/);
              if (m) {
                flush();
                current = { title: m[1], bodyLines: [] };
                continue;
              }
              if (!current) continue;

              // Stop collecting if another checklist item (checked) starts.
              if (/^\s*- \[[xX]\] /.test(line)) {
                flush();
                continue;
              }

              // Keep any nested bullet / text as body.
              if (line.trim().length > 0) current.bodyLines.push(line);
            }
            flush();

            if (entries.length === 0) {
              core.info(`No unchecked backlog items found in ${backlogPath}.`);
              return;
            }

            const selected = entries.slice(0, Math.max(0, limit));
            core.info(`Found ${entries.length} backlog items; processing ${selected.length} (limit=${limit}).`);

            if (label) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label });
              } catch (err) {
                if (err?.status === 404) {
                  if (dryRun) {
                    core.info(`[dry_run] Would create label: ${label}`);
                  } else {
                    core.info(`Creating missing label: ${label}`);
                    await github.rest.issues.createLabel({
                      owner,
                      repo,
                      name: label,
                      color: '1d76db',
                      description: 'Tracked backlog item',
                    });
                  }
                } else {
                  throw err;
                }
              }
            }

            for (const entry of selected) {
              const query = `repo:${owner}/${repo} is:issue in:title "${entry.title.replace(/"/g, '\\"')}"`;
              const search = await github.rest.search.issuesAndPullRequests({ q: query, per_page: 5 });
              const exists = (search.data.items || []).some((i) => i.title === entry.title);

              if (exists) {
                core.info(`Skipping existing issue: ${entry.title}`);
                continue;
              }

              if (dryRun) {
                core.info(`[dry_run] Would create issue: ${entry.title}`);
                continue;
              }

              core.info(`Creating issue: ${entry.title}`);
              await github.rest.issues.create({
                owner,
                repo,
                title: entry.title,
                body: entry.body,
                labels: label ? [label] : undefined,
              });
            }
